name: "[Tests] Lambda Unit Tests"

defaults:
  run:
    shell: bash

on:
  workflow_call:

permissions:
  id-token: none
  contents: read
  security-events: none
  pull-requests: none

jobs:
  lambda-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: block ips tests
        id: block-ips-tests
        run: make block-ips-tests
