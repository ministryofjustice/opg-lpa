name: Python lock-drift check

on:
  push:
    paths:
      - "**/*.toml"
      - "**/uv.lock"
  pull_request:
    paths:
      - "**/*.toml"
      - "**/uv.lock"

jobs:
  uv-lock-check:
    name: uv lock --check (${{ matrix.directory }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - directory: scripts/pipeline
            python-version: "3.14.5"
          - directory: scripts/pipeline/ci_ingress
            python-version: "3.14.5"
          - directory: scripts/call_api_gateway
            python-version: "3.14.5"
          - directory: tests/python-api-client
            python-version: "3.14.5"
          - directory: tests/sirius-gateway-mock/scripts
            python-version: "3.14.5"
          - directory: tests/load
            python-version: "3.14.5"
          - directory: locust
            python-version: "3.14.5"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.11.28"
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Check lock
        working-directory: ${{ matrix.directory }}
        run: uv lock --check
