name: Python lock-drift check

on:
  push:
    paths:
      - "**/*.toml"
      - "**/uv.lock"
  pull_request:
    paths:
      - "**/*.toml"
      - "**/uv.lock"

jobs:
  uv-lock-check:
    name: uv lock --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.11.21"
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Check scripts/pipeline lock
        working-directory: scripts/pipeline
        run: uv lock --check

      - name: Check scripts/pipeline/ci_ingress lock
        working-directory: scripts/pipeline/ci_ingress
        run: uv lock --check

      - name: Check scripts/call_api_gateway lock
        working-directory: scripts/call_api_gateway
        run: uv lock --check

      - name: Check tests/python-api-client lock
        working-directory: tests/python-api-client
        run: uv lock --check

      - name: Check tests/sirius-gateway-mock/scripts lock
        working-directory: tests/sirius-gateway-mock/scripts
        run: uv lock --check

      - name: Check tests/load lock
        working-directory: tests/load
        run: uv lock --check

      - name: Check locust lock
        working-directory: locust
        run: uv lock --check
