name: "[Workflow] Locust Tests"

defaults:
  run:
    shell: bash

on:
  workflow_dispatch:
    inputs:
      users:
        description: "Number of users"
        default: "5"
        required: true
        type: string
      run_time:
        description: "Test duration (e.g. 2m, 5m)"
        default: "2m"
        required: true
        type: string
      front_url:
        description: "URL of the frontend to run tests against"
        required: true
        type: string
  workflow_call:
    inputs:
      front_url:
        description: "URL of the frontend to run tests against"
        required: true
        type: string
      oidc_ingress_management_role:
        description: "OIDC role to assume for ingress management permissions"
        required: true
        type: string
      users:
        description: "Number of users"
        default: "5"
        type: string
      run_time:
        description: "Test duration (e.g. 2m, 5m)"
        default: "2m"
        type: string

permissions:
  actions: none
  checks: none
  contents: read
  deployments: none
  id-token: write
  issues: none
  packages: none
  pull-requests: read
  repository-projects: none
  security-events: none
  statuses: none

jobs:
  locust_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Protect against production load tests
        run: |
          if [[ "${{ inputs.front_url }}" =~ ^(https://lastingpowerofattorney\.service\.gov\.uk|https://front\.lpa\.opg\.service\.justice\.gov\.uk)$ ]]; then
            echo "Error: cannot run load tests against production"
            exit 1
          fi

      - name: Configure AWS Credentials - Ingress Management
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          aws-region: eu-west-1
          role-to-assume: ${{ inputs.oidc_ingress_management_role || vars.OIDC_INGRESS_MANAGEMENT_DEVELOPMENT }}
          role-duration-seconds: 900
          role-session-name: OPGLPACypressTestsSecurityGroupStart

      - name: Setup Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/pipeline/ci_ingress/requirements.txt

      - name: Download Terraform Task definition
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: terraform-artifact
          path: /tmp/

      - name: Add GitHub Actions runner Ingress Rule
        run: |
          python scripts/pipeline/ci_ingress/ci_ingress.py /tmp/environment_pipeline_tasks_config.json --add

      - uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          path: |
            ~/.cache/Cypress
            node_modules
          key: node-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version-file: ".nvmrc"

      - name: Run Locust Tests
        continue-on-error: true
        env:
          DISABLE_SSL_VERIFY: True
        run: |
          pip install boto3 locust beautifulsoup4 faker
          cd locust # note- for now need to run locust from within locust dir as it looks for activation_emails dir relative to this
          locust --headless -f ./locustfile.py -r 1 --host ${{ inputs.front_url }} -u ${{ inputs.users }} --run-time ${{ inputs.run_time }}

      - name: Configure AWS Credentials - Ingress Management
        if: always()
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          aws-region: eu-west-1
          role-to-assume: ${{ inputs.oidc_ingress_management_role || vars.OIDC_INGRESS_MANAGEMENT_DEVELOPMENT }}
          role-duration-seconds: 900
          role-session-name: OPGLPACypressTestsSecurityGroupEnd

      - name: Remove GitHub Actions runner Ingress Rule
        if: always()
        run: |
          python scripts/pipeline/ci_ingress/ci_ingress.py /tmp/environment_pipeline_tasks_config.json
