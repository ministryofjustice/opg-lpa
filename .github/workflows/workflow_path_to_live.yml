name: "[Workflow] Path to Live"

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}

defaults:
  run:
    shell: bash

on:
  push:
    branches:
      - main

permissions:
  actions: none
  checks: none
  contents: write
  deployments: write
  id-token: write
  issues: none
  packages: none
  pull-requests: read
  repository-projects: none
  security-events: write
  statuses: none

jobs:
  set_variables:
    name: Set variables
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.short_sha.outputs.short_sha }}
      semver_tag: ${{ steps.semver_tag.outputs.tag }}
      environment_terraform_version: ${{ steps.terraform_version_environment.outputs.version }}
      account_terraform_version: ${{ steps.terraform_version_account.outputs.version }}
      region_terraform_version: ${{ steps.terraform_version_region.outputs.version }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Set output to penultimate short SHA
        id: short_sha
        run: |
          echo "short_sha=$(git rev-list --no-merges -n 1 HEAD | cut -c1-7)" >> $GITHUB_OUTPUT
      - name: Set terraform version - environment
        id: terraform_version_environment
        uses: ministryofjustice/opg-github-actions/actions/terraform-version@77bb12e7fec3bcee9a6a35cb21361195e027a12a # v4.9.0
        with:
          terraform_directory: "./terraform/environment"
      - name: Set terraform version - account
        id: terraform_version_account
        uses: ministryofjustice/opg-github-actions/actions/terraform-version@77bb12e7fec3bcee9a6a35cb21361195e027a12a # v4.9.0
        with:
          terraform_directory: "./terraform/account"
      - name: Set terraform version - region
        id: terraform_version_region
        uses: ministryofjustice/opg-github-actions/actions/terraform-version@77bb12e7fec3bcee9a6a35cb21361195e027a12a # v4.9.0
        with:
          terraform_directory: "./terraform/region"
      - name: Bump version and push tag
        uses: ministryofjustice/opg-github-actions/actions/semver@77bb12e7fec3bcee9a6a35cb21361195e027a12a # v4.9.0
        id: semver_tag
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: ${{ github.ref != 'refs/heads/main' }}
          default_bump: minor

  snyk_iac_scan:
    name: Snyk IAC Scan
    uses: ./.github/workflows/snyk_iac_scan.yml
    with:
      oidc_role: ${{ vars.OIDC_DOCKER_ROLE }}
    secrets:
      snyk_token: ${{ secrets.SNYK_OPG_ORG_TOKEN }}

  docker_build_scan_push:
    name: Docker Build, Scan and Push
    uses: ./.github/workflows/docker_job.yml
    needs:
      - set_variables
    with:
      oidc_docker_role: ${{ vars.OIDC_DOCKER_ROLE }}
      tag: main-${{ needs.set_variables.outputs.semver_tag }}
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SNYK_OPG_ORG_TOKEN: ${{ secrets.SNYK_OPG_ORG_TOKEN }}

  terraform_account_development:
    name: TF Development - Account
    needs:
      - set_variables
      - snyk_iac_scan
    uses: ministryofjustice/opg-github-workflows/.github/workflows/build-infrastructure-terraform-oidc.yml@17ca444d0b23a0f9f6c612f1bfb8dc9be358f235 # v3.19.6
    with:
      is_ephemeral: false
      oidc_role_to_assume: ${{ vars.OIDC_TERRAFORM_ROLE_PRODUCTION }}
      terraform_apply: true
      terraform_directory: ./terraform/account
      terraform_version: ${{ needs.set_variables.outputs.account_terraform_version }}
      terraform_workspace: development
    secrets:
      GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PAGERDUTY_TOKEN: ${{ secrets.PAGERDUTY_TOKEN }}
      SSH_PRIVATE_KEY: ${{ secrets.OPG_LPA_DEPLOY_KEY_PRIVATE_KEY }}

  terraform_region_development:
    name: TF Development - Region
    uses: ministryofjustice/opg-github-workflows/.github/workflows/build-infrastructure-terraform-oidc.yml@17ca444d0b23a0f9f6c612f1bfb8dc9be358f235 # v3.19.6
    needs:
      - set_variables
      - snyk_iac_scan
      - terraform_account_development
    with:
      is_ephemeral: false
      oidc_role_to_assume: ${{ vars.OIDC_TERRAFORM_ROLE_PRODUCTION }}
      terraform_apply: true
      terraform_directory: ./terraform/region
      terraform_version: ${{ needs.set_variables.outputs.environment_terraform_version }}
      terraform_workspace: development
    secrets:
      GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PAGERDUTY_TOKEN: ${{ secrets.PAGERDUTY_TOKEN }}
      SSH_PRIVATE_KEY: ${{ secrets.OPG_LPA_DEPLOY_KEY_PRIVATE_KEY }}

  slack_msg_production_deploy_begin:
    name: Annouce Production Deployment
    runs-on: ubuntu-latest
    outputs:
      ts: ${{ steps.slack.outputs.ts }}
      thread_ts: ${{ steps.slack.outputs.thread_ts }}
    needs:
      - docker_build_scan_push
      - set_variables
    steps:
      - id: slack
        uses: slackapi/slack-github-action@fcfb566f8b0aab22203f066d80ca1d7e4b5d05b3 # v1.27.1
        with:
          channel-id: "C09M1LWJ2G0"
          payload: |
            {
              "icon_emoji": ":robot_face:",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Production Deployment",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Status:*\nStarted :hourglass_flowing_sand:"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Started by:*\n ${{ github.triggering_actor }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n <https://github.com/ministryofjustice/opg-lpa/commit/${{ github.sha }}|${{ needs.set_variables.outputs.short_sha }}>"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<https://github.com/ministryofjustice/opg-lpa/actions/runs/${{github.run_id}}|View workflow>"
                  }
                }
              ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN}}

  terraform_account_production:
    name: TF Production - Account
    uses: ministryofjustice/opg-github-workflows/.github/workflows/build-infrastructure-terraform-oidc.yml@17ca444d0b23a0f9f6c612f1bfb8dc9be358f235 # v3.19.6
    needs:
      - slack_msg_production_deploy_begin
      - snyk_iac_scan
      - set_variables
    with:
      is_ephemeral: false
      oidc_role_to_assume: ${{ vars.OIDC_TERRAFORM_ROLE_PRODUCTION }}
      terraform_apply: true
      terraform_directory: ./terraform/account
      terraform_version: ${{ needs.set_variables.outputs.account_terraform_version }}
      terraform_workspace: production
    secrets:
      GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PAGERDUTY_TOKEN: ${{ secrets.PAGERDUTY_TOKEN }}
      SSH_PRIVATE_KEY: ${{ secrets.OPG_LPA_DEPLOY_KEY_PRIVATE_KEY }}

  terraform_region_production:
    name: TF Production - Region
    uses: ministryofjustice/opg-github-workflows/.github/workflows/build-infrastructure-terraform-oidc.yml@17ca444d0b23a0f9f6c612f1bfb8dc9be358f235 # v3.19.6
    needs:
      - slack_msg_production_deploy_begin
      - set_variables
      - snyk_iac_scan
      - terraform_account_production
    with:
      is_ephemeral: false
      oidc_role_to_assume: ${{ vars.OIDC_TERRAFORM_ROLE_PRODUCTION }}
      terraform_apply: true
      terraform_directory: ./terraform/region
      terraform_version: ${{ needs.set_variables.outputs.region_terraform_version }}
      terraform_workspace: production
    secrets:
      GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PAGERDUTY_TOKEN: ${{ secrets.PAGERDUTY_TOKEN }}
      SSH_PRIVATE_KEY: ${{ secrets.OPG_LPA_DEPLOY_KEY_PRIVATE_KEY }}

  terraform_environment_production:
    name: TF Production - Environment
    uses: ministryofjustice/opg-github-workflows/.github/workflows/build-infrastructure-terraform-oidc.yml@17ca444d0b23a0f9f6c612f1bfb8dc9be358f235 # v3.19.6
    with:
      is_ephemeral: false
      oidc_role_to_assume: ${{ vars.OIDC_TERRAFORM_ROLE_PRODUCTION }}
      persist_artifacts: true
      terraform_apply: true
      terraform_directory: ./terraform/environment
      terraform_variables: "-var container_version=main-${{ needs.set_variables.outputs.semver_tag }}"
      terraform_version: ${{ needs.set_variables.outputs.environment_terraform_version }}
      terraform_workspace: production
      use_ssh_private_key: true
    needs:
      - docker_build_scan_push
      - slack_msg_production_deploy_begin
      - set_variables
      - snyk_iac_scan
      - terraform_region_production
    secrets:
      GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PAGERDUTY_TOKEN: ${{ secrets.PAGERDUTY_TOKEN }}
      SSH_PRIVATE_KEY: ${{ secrets.OPG_LPA_DEPLOY_KEY_PRIVATE_KEY }}

  run_smoke_tests:
    runs-on: ubuntu-latest
    outputs:
      smoke_test_status: ${{ steps.smoke_tests.outputs.smoke_test_status }}
    needs:
      - terraform_environment_production
      - terraform_region_production
      - terraform_account_production
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download Terraform Task definition
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: terraform-artifact
          path: /tmp/

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.11.24"
          python-version: "3.14.5"
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        working-directory: scripts/pipeline
        run: uv sync --locked

      - name: Run smoke tests
        id: smoke_tests
        working-directory: scripts/pipeline
        run: |
          if uv run python healthcheck_test/healthcheck_test.py; then
            echo "smoke_test_status=passed" >> $GITHUB_OUTPUT
          else
            echo "smoke_test_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

  slack_msg_production_deployed:
    name: Post-Deployment Slack message
    runs-on: ubuntu-latest
    if: always()
    needs:
      - slack_msg_production_deploy_begin
      - run_smoke_tests
      - set_variables
    environment:
      name: "production"
      url: "https://www.lastingpowerofattorney.service.gov.uk/home"
    steps:
      - uses: slackapi/slack-github-action@fcfb566f8b0aab22203f066d80ca1d7e4b5d05b3 # v1.27.1
        if: needs.run_smoke_tests.outputs.smoke_test_status == 'passed'
        with:
          channel-id: "C09M1LWJ2G0"
          update-ts: ${{ needs.slack_msg_production_deploy_begin.outputs.ts }}
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Make - production release",
                    "emoji": true
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": ":white_check_mark: <https://github.com/${{ github.payload.repository.full_name }}/actions/runs/${{ github.runId }}|Success>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": ":astronaut: ${{ github.triggering_actor }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": ":floppy_disk: <https://github.com/ministryofjustice/opg-lpa/commit/${{ github.sha }}|Commit>"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - uses: slackapi/slack-github-action@fcfb566f8b0aab22203f066d80ca1d7e4b5d05b3 # v1.27.1
        if: needs.run_smoke_tests.outputs.smoke_test_status != 'passed'
        with:
          channel-id: "C09M1LWJ2G0"
          update-ts: ${{ needs.slack_msg_production_deploy_begin.outputs.ts }}
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Make - production release",
                    "emoji": true
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": ":cross-red: <https://github.com/${{ github.payload.repository.full_name }}/actions/runs/${{ github.runId }}|Failed>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": ":astronaut: ${{ github.triggering_actor }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": ":floppy_disk: <https://github.com/ministryofjustice/opg-lpa/commit/${{ github.sha }}|Commit>"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - uses: slackapi/slack-github-action@fcfb566f8b0aab22203f066d80ca1d7e4b5d05b3 # v1.27.1
        if: needs.run_smoke_tests.outputs.smoke_test_status != 'passed'
        with:
          channel-id: "C09L117EZ27"
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Production Make deployment failed. Please check the <https://github.com/ministryofjustice/opg-lpa/actions/runs/${{github.run_id}}|workflow> for more details. <!here>"
                  }
                }
              ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
