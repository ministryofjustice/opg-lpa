name: eslint analysis

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  eslint:
    name: Run eslint
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Clone repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run eslint
        run: |
          docker compose run --rm npm-root ci --ignore-scripts
          docker compose run --rm npm-root run lint:check
