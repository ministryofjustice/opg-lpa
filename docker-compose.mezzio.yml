services:

  # ---------------------------
  # Backend services (shared with main stack)

  postgres:
    container_name: lpa-postgres
    image: postgres:14.18@sha256:90da0743e4ed7939b08e2945e0451401b4d7abd792530c7d3cc2da82ed534f08
    ports:
      - 5434:5432
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: lpadb
      POSTGRES_USER: lpauser
      POSTGRES_PASSWORD: lpapass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready --username=lpauser --dbname=lpadb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: lpa-redis
    image: library/redis:8.4-alpine@sha256:054c4e144f09447f69091fee43b7ed33ad7b9bd13d756a073675f2e711eb383c

  dynamodb:
    container_name: lpa-dynamodb
    image: amazon/dynamodb-local@sha256:d89f8fcc6b1a39cb35976c248ed42a28c66ae00dc043099210f5571e42648ab4

  mock-pay:
    container_name: lpa-mock-pay
    build:
      dockerfile: mock-pay/docker/Dockerfile
    ports:
      - "4547:8080"
    environment:
      - IMPOSTER_LOG_LEVEL=TRACE

  localstack:
    container_name: lpa-localstack
    image: localstack/localstack:4.14.0@sha256:3ebc37595918b8accb852f8048fef2aff047d465167edd655528065b07bc364a
    depends_on:
      dynamodb:
        condition: service_started
    privileged: true
    ports:
      - "127.0.0.1:4566:4566"
    environment:
      AWS_ACCESS_KEY_ID: "devkey"
      AWS_SECRET_ACCESS_KEY: "secretdevkey"
      DEBUG: 1
      DYNAMODB_URL: http://dynamodb:8000
      FRONT_DOMAIN: localhost:7004
      HOSTNAME: localstack
      LAMBDA_DOCKER_NETWORK: malpadev
      LAMBDA_EXECUTOR: docker
      OPG_LPA_COMMON_PDF_QUEUE_NAME: pdf-queue.fifo
      OPG_LPA_COMMON_PDF_CACHE_S3_BUCKET: "lpacache"
      OPG_LPA_COMMON_SQS_ENDPOINT: localstack:4566
      OPG_LPA_COMMON_S3_ENDPOINT: localstack:4566
      SERVICES: sqs,s3,lambda,secretsmanager
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./localstack/:/etc/localstack/init/ready.d/
    networks:
      default:
        aliases:
          - sqs.eu-west-1.localhost.localstack.cloud
    healthcheck:
      test: ["CMD", "curl", "http://localhost:4566/_localstack/health?reload"]

  # ---------------------------
  # API

  api-web:
    container_name: lpa-api-web
    image: lpa-api-web
    depends_on:
      - api-app
    build:
      context: ./
      dockerfile: service-api/docker/web/Dockerfile
    ports:
      - 7001:8080
    environment:
      APP_HOST: api-app
      APP_PORT: 9000

  api-app:
    container_name: lpa-api-app
    image: lpa-api-app
    build:
      context: ./
      args:
        ENABLE_XDEBUG: "0"
        OPG_LPA_COMMON_APP_VERSION: "dev"
      dockerfile: service-api/docker/app/Dockerfile
    volumes:
      - ./service-api:/app
      - ./shared:/shared
    depends_on:
      dynamodb:
        condition: service_started
      localstack:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      OPG_LPA_STACK_NAME: "local"
      OPG_LPA_STACK_ENVIRONMENT: "dev"
      OPG_LPA_API_NOTIFY_API_KEY: ""
      OPG_LPA_AUTH_TOKEN_GENERATION: "hash"
      OPG_LPA_POSTGRES_HOSTNAME: "postgres"
      OPG_LPA_POSTGRES_PORT: "5432"
      OPG_LPA_POSTGRES_NAME: "lpadb"
      OPG_LPA_POSTGRES_USERNAME: "lpauser"
      OPG_LPA_POSTGRES_PASSWORD: "lpapass"
      OPG_LPA_API_PDF_ENCRYPTION_KEY_DOCUMENT: "0L5Mn687f312aj827NQq648U7899o91r"
      OPG_LPA_COMMON_ADMIN_DYNAMODB_TABLE: "Properties"
      OPG_LPA_COMMON_PDF_CACHE_S3_BUCKET: "lpacache"
      OPG_LPA_COMMON_CRONLOCK_DYNAMODB_TABLE: "Locks"
      OPG_LPA_PROCESSING_STATUS_ENDPOINT: "http://host.docker.internal:4343/v1/"
      OPG_LPA_AUTH_TOKEN_TTL: 4500
      OPG_LPA_COMMON_DYNAMODB_AUTO_CREATE: "true"
      OPG_LPA_COMMON_ADMIN_ACCOUNTS: "${OPG_LPA_COMMON_ADMIN_ACCOUNTS}"
      AWS_ACCESS_KEY_ID: "devkey"
      AWS_SECRET_ACCESS_KEY: "secretdevkey"
      LPA_FEE_EFFECTIVE_DATE: "2025-09-17T14:30:00"
      OPG_LPA_COMMON_DYNAMODB_ENDPOINT: http://dynamodb:8000
      OPG_LPA_COMMON_S3_ENDPOINT: http://localstack:4566
      OPG_LPA_COMMON_PDF_QUEUE_URL: http://localstack:4566/000000000000/pdf-queue.fifo
      OPG_LPA_TELEMETRY_HOST: ""
      OPG_LPA_TELEMETRY_PORT: ""
      PHP_OPCACHE_VALIDATE_TIMESTAMPS: 1
    healthcheck:
      test: ["CMD", "/usr/local/bin/health-check.sh"]
      interval: 10s
      timeout: 15s
      retries: 3
      start_period: 90s

  # ---------------------------
  # Mezzio front

  seeding:
    container_name: lpa-seeding
    image: lpa-seeding
    build:
      context: ./
      dockerfile: service-seeding/docker/app/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      dynamodb:
        condition: service_started
      api-app:
        condition: service_started
    volumes:
      - ./scripts/non_live_seeding:/app
    environment:
      OPG_LPA_STACK_NAME: "local"
      OPG_LPA_STACK_ENVIRONMENT: "dev"
      OPG_LPA_POSTGRES_HOSTNAME: "postgres"
      OPG_LPA_POSTGRES_PORT: "5432"
      OPG_LPA_POSTGRES_NAME: "lpadb"
      OPG_LPA_POSTGRES_USERNAME: "lpauser"
      OPG_LPA_POSTGRES_PASSWORD: "lpapass"


  # ---------------------------
  # Mezzio front

  mezzio-app:
    container_name: lpa-mezzio-app
    image: lpa-mezzio-app
    build:
      context: ./
      args:
        ENABLE_XDEBUG: 0
      dockerfile: service-front/mezzio/docker/app/Dockerfile
    volumes:
      - ./service-front/mezzio/config:/app/config
      - ./service-front/mezzio/src:/app/src
      - ./service-front/mezzio/test:/app/test
      - ./service-front/mezzio/phpunit.xml:/app/phpunit.xml
      - ./service-front/mezzio/psalm.xml:/app/psalm.xml
      - ./service-front/mezzio/phpcs.xml:/app/phpcs.xml
      - ./service-front/module:/service-front/module
      - ./service-front/mezzio/content:/app/content
      - ./shared:/shared
    depends_on:
      api-app:
        condition: service_healthy
      dynamodb:
        condition: service_started
      localstack:
        condition: service_healthy
      pdf-app:
        condition: service_started
      mock-pay:
        condition: service_started
    environment:
      PHP_IDE_CONFIG: serverName=lpa-mezzio-app
      OPG_LPA_STACK_NAME: "local"
      OPG_LPA_STACK_ENVIRONMENT: "dev"
      OPG_LPA_ENDPOINTS_API: "http://api-web:8080"
      OPG_LPA_COMMON_ADMIN_DYNAMODB_TABLE: "Properties"
      OPG_LPA_COMMON_CRONLOCK_DYNAMODB_TABLE: "Locks"
      OPG_LPA_COMMON_SESSION_DYNAMODB_TABLE: "Sessions"
      OPG_LPA_FRONT_CSRF_SALT: "test"
      OPG_LPA_FRONT_TWIG_CACHE_DIR: "false"
      AWS_ACCESS_KEY_ID: "devkey"
      AWS_SECRET_ACCESS_KEY: "secretdevkey"
      LPA_FEE_EFFECTIVE_DATE: "2025-11-17T00:00:00"
      OPG_LPA_COMMON_DYNAMODB_ENDPOINT: http://dynamodb:8000
      PHP_OPCACHE_VALIDATE_TIMESTAMPS: 1
      OPG_LPA_COMMON_REDIS_CACHE_URL: tcp://redis:6379
      OPG_LPA_COMMON_ADMIN_ACCOUNTS: "${OPG_LPA_COMMON_ADMIN_ACCOUNTS}"
      OPG_LPA_FRONT_GOV_PAY_KEY: "${OPG_LPA_FRONT_GOV_PAY_KEY}"
      OPG_LPA_FRONT_GOV_PAY_URL: "http://mock-pay:8080"
      OPG_LPA_FRONT_OS_PLACES_HUB_LICENSE_KEY: "${OPG_LPA_FRONT_OS_PLACES_HUB_LICENSE_KEY}"
      OPG_LPA_OS_PLACES_HUB_ENDPOINT: "https://api.os.uk/search/places/v1/postcode"
    healthcheck:
      test: ["CMD-SHELL", "cgi-fcgi -bind -connect 127.0.0.1:9000 || exit 1"]
      interval: 10s
      timeout: 15s
      retries: 3
      start_period: 90s

  mezzio-web:
    container_name: lpa-mezzio-web
    image: lpa-mezzio-web
    depends_on:
      mezzio-app:
        condition: service_healthy
    build:
      context: ./
      dockerfile: service-front/docker/web/Dockerfile
    # Point the shared nginx image at the Mezzio app's public/ directory
    # Mount the legacy app's already-built CSS / JS / fonts / images
    # into /web/assets/v2 so the duplicated home page can render with the
    # full GOV.UK frontend styling. This is a temporary arrangement until the
    # asset build pipeline is duplicated into the mezzio app proper.
    volumes:
      - ./service-front/mezzio/public:/web
      - ./service-front/public/assets/v2:/web/assets/v2:ro
      - ./service-front/docker/web/etc/nginx/templates/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    environment:
      APP_HOST: mezzio-app
      APP_PORT: 9000

  mezzio-ssl:
    container_name: lpa-mezzio-ssl
    image: lpa-mezzio-ssl
    depends_on:
      - mezzio-web
    build:
      context: ./
      dockerfile: local-ssl/docker/Dockerfile
    ports:
      - 7004:443
    volumes:
      - ./local-ssl/certs:/etc/nginx/certs
    environment:
      DOMAIN: "localhost"
      TARGET_HOST_HEADER: "localhost:7004"
      SSL_PORT: "443"
      TARGET_HOST: "mezzio-web"
      TARGET_PORT: "8080"

  # ---------------------------
  # PDF

  pdf-app:
    container_name: lpa-pdf-app
    image: lpa-pdf-app
    depends_on:
      localstack:
        condition: service_healthy
    volumes:
      - ./service-pdf:/app
      - ./shared:/shared
    tmpfs:
      - /tmp/
    build:
      context: ./
      args:
        ENABLE_XDEBUG: "0"
        VISUAL_TESTS: true
      dockerfile: service-pdf/docker/app/Dockerfile
    environment:
      OPG_LPA_COMMON_PDF_CACHE_S3_BUCKET: "lpacache"
      AWS_ACCESS_KEY_ID: "devkey"
      AWS_SECRET_ACCESS_KEY: "secretdevkey"
      OPG_LPA_COMMON_S3_ENDPOINT: http://localstack:4566
      OPG_LPA_COMMON_PDF_QUEUE_URL: http://sqs.eu-west-1.localhost.localstack.cloud:4566/000000000000/pdf-queue.fifo

  # ---------------------------
  # Admin

  admin-web:
    container_name: lpa-admin-web
    image: lpa-admin-web
    depends_on:
      - admin-app
    build:
      context: ./
      dockerfile: service-admin/docker/web/Dockerfile
    environment:
      APP_HOST: admin-app
      APP_PORT: 9000

  admin-app:
    container_name: lpa-admin-app
    image: lpa-admin-app
    build:
      context: ./
      dockerfile: service-admin/docker/app/Dockerfile
      args:
        ENABLE_XDEBUG: "0"
    volumes:
      - ./service-admin:/app
      - ./shared:/shared
    depends_on:
      dynamodb:
        condition: service_started
      localstack:
        condition: service_healthy
    environment:
      OPG_LPA_STACK_NAME: "local"
      OPG_LPA_STACK_ENVIRONMENT: "dev"
      OPG_LPA_ENDPOINTS_API: "http://api-web:8080"
      OPG_LPA_COMMON_ADMIN_DYNAMODB_TABLE: "Properties"
      OPG_LPA_COMMON_CRONLOCK_DYNAMODB_TABLE: "Locks"
      OPG_LPA_COMMON_SESSION_DYNAMODB_TABLE: "Sessions"
      OPG_LPA_ADMIN_JWT_SECRET: "test-secret-test-secret-test-secret-test-secret"
      AWS_ACCESS_KEY_ID: "devkey"
      AWS_SECRET_ACCESS_KEY: "secretdevkey"
      OPG_LPA_COMMON_DYNAMODB_ENDPOINT: http://dynamodb:8000
      PHP_OPCACHE_VALIDATE_TIMESTAMPS: 1
      OPG_LPA_COMMON_ADMIN_ACCOUNTS: "${OPG_LPA_COMMON_ADMIN_ACCOUNTS}"
    healthcheck:
      test: ["CMD", "/usr/local/bin/health-check.sh"]
      interval: 10s
      timeout: 15s
      retries: 3
      start_period: 90s

  admin-ssl:
    container_name: lpa-admin-ssl
    image: lpa-admin-ssl
    depends_on:
      - admin-web
    build:
      context: ./
      dockerfile: local-ssl/docker/Dockerfile
    ports:
      - 7003:443
    volumes:
      - ./local-ssl/certs:/etc/nginx/certs
    environment:
      DOMAIN: "localhost"
      TARGET_HOST_HEADER: "localhost:7003"
      SSL_PORT: "443"
      TARGET_HOST: "admin-web"
      TARGET_PORT: "8080"

  cypress-mezzio:
    depends_on:
      - mezzio-ssl
      - admin-ssl
    build:
      context: ./
      dockerfile: cypress/Dockerfile
    environment:
      CYPRESS_baseUrl: "https://mezzio-ssl"
      CYPRESS_adminUrl: "https://admin-ssl"
      SERVICE_API_ROOT: "http://api-web:8080"
    volumes:
      - ./cypress:/app/cypress
      - ./cypress/screenshots:/app/cypress/screenshots
      - ./cypress.config.js:/app/cypress.config.js

  front-app-mezzio-test:
    profiles: ["test"]
    image: lpa-front-app-mezzio-test
    build:
      context: ./
      dockerfile: service-front/mezzio/docker/app/Dockerfile
      target: test-runner
      args:
        ENABLE_XDEBUG: "1"
