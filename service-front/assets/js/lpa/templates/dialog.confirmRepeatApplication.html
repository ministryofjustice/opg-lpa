<div class="dialog-container">

    <h2 id="dialog-title" class="dialog-title-block">{{dialogTitle}}</h2>

    <div id="dialog-message" class="dialog-message-block"><p class="govuk-body">{{dialogMessage}}</p></div>

    <div class="dialog__button-bar">
        <a href="#" class="govuk-button dialog__button--accept {{acceptClass}}">{{acceptButtonText}}</a>
        <a href="#" class="govuk-button govuk-button--secondary dialog__button--cancel  {{cancelClass}}">{{cancelButtonText}}</a>
    </div>

</div>
